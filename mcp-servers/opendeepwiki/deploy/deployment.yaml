apiVersion: apps/v1
kind: Deployment
metadata:
  name: opendeepwiki
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: opendeepwiki
spec:
  replicas: 1  
  strategy:
    type: Recreate  
  selector:
    matchLabels:
      app.kubernetes.io/name: opendeepwiki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opendeepwiki
    spec:
      containers:
        - name: koalawiki
          image: ghcr.io/aiddotnet/opendeepwiki:latest
          ports:
            - name: backend
              containerPort: 5085
          envFrom:
            - configMapRef:
                name: opendeepwiki-config
            - secretRef:
                name: opendeepwiki-secret
          volumeMounts:
            - name: data
              mountPath: /data
            - name: data
              mountPath: /repositories
              subPath: repositories
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: 5085
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5085
            initialDelaySeconds: 30
            periodSeconds: 30

        - name: koalawiki-web
          image: ghcr.io/aiddotnet/opendeepwiki-web:latest
          ports:
            - name: frontend
              containerPort: 3000
          env:
            - name: API_URL
              value: "http://localhost:5085"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: opendeepwiki-data
