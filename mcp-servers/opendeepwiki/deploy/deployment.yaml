apiVersion: apps/v1
kind: Deployment
metadata:
  name: opendeepwiki
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: opendeepwiki
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: opendeepwiki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opendeepwiki
    spec:
      securityContext:
        fsGroup: 1000  # ensures the PVC is group-writable by the container process
      initContainers:
        - name: init-data-dir
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data && chmod 777 /data"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: opendeepwiki
          image: public.ecr.aws/medic/opendeepwiki-web:backend-mar16-nogoogleauth
          ports:
            - name: backend
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: opendeepwiki-config
            - secretRef:
                name: opendeepwiki-secret
          volumeMounts:
            - name: data
              mountPath: /data
            - name: prompts
              mountPath: /app/prompts
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30

        - name: opendeepwiki-web
          image: public.ecr.aws/medic/opendeepwiki-web:1.0.0
          ports:
            - name: frontend
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_PROXY_URL
              value: "http://localhost:8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: opendeepwiki-data
        - name: prompts
          configMap:
            name: opendeepwiki-prompts