apiVersion: v1
kind: Secret
metadata:
  name: opendeepwiki-secret
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: opendeepwiki
type: Opaque
stringData:
  # Single key used for all three: primary chat, catalog generation, content generation
  CHAT_API_KEY: "REPLACE_ME"
  WIKI_CATALOG_API_KEY: "REPLACE_ME"
  WIKI_CONTENT_API_KEY: "REPLACE_ME"
